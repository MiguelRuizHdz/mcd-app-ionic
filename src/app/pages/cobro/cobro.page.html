<ion-header mode="ios">
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-back-button defaultHref="/tabs/clientes"></ion-back-button>
        </ion-buttons>
        <ion-title>Registrar Pago</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content>
    <div class="header-cobro ion-text-center ion-padding">
        <h2 class="ion-no-margin">{{ adeudo?.concepto }}</h2>
        <p class="color-medium">Saldo pendiente: {{ adeudo?.aDeber | currency }}</p>
    </div>

    <ion-list mode="ios" class="inset-list">
        <ion-item lines="inset">
            <ion-label position="fixed">Monto</ion-label>
            <ion-input type="number" inputmode="decimal" [(ngModel)]="pago.monto"
                placeholder="Ingrese monto"></ion-input>
            <ion-icon slot="end" name="cash-outline"></ion-icon>
        </ion-item>
        <ion-note class="ion-padding-start" color="medium">
            Se ha pre-llenado con el total pendiente. Puedes editarlo para abonos parciales.
        </ion-note>

        <ion-item lines="inset">
            <ion-label position="fixed" style="min-width: 100px;">Folio/Ref</ion-label>
            <ion-input type="text" [(ngModel)]="pago.folio" placeholder="Opcional"></ion-input>
        </ion-item>
    </ion-list>

    <div class="ion-padding">
        <div class="foto-comprobante-container ion-text-center" (click)="tomarFoto()">
            <div *ngIf="!pago.comprobante" class="placeholder-foto">
                <ion-icon name="camera-outline"></ion-icon>
                <p>Adjuntar captura o foto del pago</p>
            </div>
            <img *ngIf="pago.comprobante" [src]="pago.comprobante" class="foto-comprobante" />
            <ion-button *ngIf="pago.comprobante" fill="clear" color="danger"
                (click)="$event.stopPropagation(); pago.comprobante = ''">
                Quitar foto
            </ion-button>
        </div>
    </div>

    <div class="ion-padding">
        <ion-button expand="block" shape="round" (click)="registrarPago()" [disabled]="!pago.monto || pago.monto <= 0">
            Confirmar Pago
        </ion-button>
    </div>
</ion-content>
