<ion-header mode="ios">
  <ion-toolbar>
    <ion-title>Historial de Pagos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div *ngFor="let grupo of pagosAgrupados">
    <ion-list-header mode="ios">
      <ion-label>{{ grupo.fecha }}</ion-label>
    </ion-list-header>

    <ion-list mode="ios" class="inset-list">
      <ion-item-sliding *ngFor="let pago of grupo.pagos">
        <ion-item>
          <ion-avatar slot="start" *ngIf="pago.comprobante">
            <img [src]="pago.comprobante" />
          </ion-avatar>
          <ion-icon slot="start" name="image-outline" *ngIf="!pago.comprobante" color="medium"></ion-icon>
          <ion-label>
            <h2>{{ pago.nombreCliente }}</h2>
            <p>{{ pago.concepto }} <span *ngIf="pago.folio" class="folio-text">(Ref: {{ pago.folio }})</span></p>
          </ion-label>
          <ion-note slot="end" color="success" class="monto-pago">
            + {{ pago.monto | currency }}
          </ion-note>
        </ion-item>

        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="confirmarEliminarPago(pago.id)">
            <ion-icon slot="icon-only" name="trash"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>
  </div>

  <div class="ion-padding ion-text-center" *ngIf="pagosAgrupados.length === 0">
    <ion-label color="medium">No hay pagos registrados aún</ion-label>
  </div>
</ion-content>
